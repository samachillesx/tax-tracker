name: Env Secrets

on:
    # push
    workflow_dispatch

env: # example of global level env, which means run globally
    GLOBAL_APP_ENV: global-env
jobs:
    build:
        runs-on: ubuntu-latest

        env: # example of job level env
            JOB_APP_ENV: job-env

        steps:
            - name: Say Hello
              run: echo "This is it. Hello from the second workflow!"

            - name: Install
              env: # example of step level env
                    APP_ENV: dev_new
                    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
              run: echo "Environment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"
