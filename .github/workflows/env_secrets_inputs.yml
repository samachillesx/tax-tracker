name: Demo CI Env Secrets 2

on:
    # push
    workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Say Hello
              run: echo "This is it. Hello from the second workflow!"

            - name: Install
              env:
                    APP_ENV: dev_new
                    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
              run: echo "Environment $APP_ENV using $DB_PASSWORD"
